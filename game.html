      /* CSS Variables for easier theming and consistency */
      :root {

          --button-hover-border-color: #666;

          font-size: var(--font-size-base);
          font-weight: bold;
          color: var(--text-color);
          background: var(--button-bg-color);
          border: 2px solid var(--button-border-color);
          border-radius: var(--border-radius);
          cursor: pointer;
          transition: all var(--transition-speed) ease;
          text-align: center; /* Ensure text is centered */
      }

      button:hover {
          background: var(--button-hover-bg-color);
          border-color: var(--button-hover-border-color);
      }

      /* Style for potential error messages if needed, though alerts are used */
      .error-message {

    <script>

      const gameLaunchers = [

              url: 'https://gist.githubusercontent.com/coolgame67/59d6a8b124e82fba41bed018d8aade56/raw/492db0757bd03c3b3dd04ec65fdc0f0a7297258b/gistfile1.html',
              corsRequired: false // This one requires a proxy
          }
      ];

      /**
       * Opens a new blank window and writes the provided HTML content into it.
       * @param {string} htmlContent - The HTML content to write.
       * @param {string} windowTitle - The title for the new window.
       * @returns {Window|null} The opened window object or null if blocked.
       */
      function launchDirect(htmlContent, windowTitle = 'Game Window') {
          const blankWindow = window.open('about:blank', '_blank');
          if (!blankWindow) {
              // More user-friendly error message for popup blockers
              alert('Popup blocked! Please allow popups for this site to launch games.');
              return null;
          }
          try {
              // Ensure the document is ready before writing
              blankWindow.document.open();
              blankWindow.document.write(`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${windowTitle}</title></head><body>${htmlContent}</body></html>`);
              blankWindow.document.close();
              // Optional: Focus the new window
              blankWindow.focus();
          } catch (e) {
              console.error("Error writing to new window:", e);
              alert(`Failed to display game content. Error: ${e.message}`);
              blankWindow.close(); // Close the window if writing fails
              return null;
          }
          return blankWindow;
      }

      /**
       * Fetches HTML content from a URL and launches it.
       * Handles CORS proxying if required.
       * @param {object} launcherConfig - Configuration object for the launcher.
       */
      async function fetchAndLaunch(launcherConfig) {
          const { label, url, corsRequired } = launcherConfig;
          let fetchUrl = url;

          if (corsRequired) {
              // Use a reliable CORS proxy service
              // Note: Relying on external CORS proxies can be fragile.
              // For production, consider a backend proxy.
              fetchUrl = `https://corsproxy.io?${encodeURIComponent(url)}`;
              console.log(`Using CORS proxy for: ${url}`);
          }

          try {
              const response = await fetch(fetchUrl);
              if (!response.ok) {
                  // Provide more context in the error message
                  throw new Error(`HTTP error! Status: ${response.status} - ${response.statusText}`);
              }
              const htmlContent = await response.text();
              launchDirect(htmlContent, label); // Pass label as window title
          } catch (error) {
              console.error(`Failed to fetch or launch ${label}:`, error);
              alert(`Failed to launch "${label}": ${error.message}`);
          }
      }

      // --- Initialization ---

      // Function to create and append buttons dynamically
      function renderButtons() {
          const btnContainer = document.querySelector('.btn-container');
          if (!btnContainer) return;

          // Clear existing buttons if any (useful for re-rendering)
          btnContainer.innerHTML = '';

          gameLaunchers.forEach(launcher => {
              const button = document.createElement('button');
              button.textContent = launcher.label;
              button.onclick = () => fetchAndLaunch(launcher); // Assign fetchAndLaunch with config
              btnContainer.appendChild(button);
          });
      }

      // Render buttons when the DOM is ready
      document.addEventListener('DOMContentLoaded', renderButtons);
