<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harbor Boys — Admin Game</title>

<script>
  // Redirect if not logged in
  if (localStorage.getItem("hb_auth") !== "true") {
    window.location.href = "login.html";
  }
</script>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0a0804;
    color: #f5edd8;
    font-family: Arial, sans-serif;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;
  }

  .game-container {
    width: 100%;
    max-width: 600px;

    background: #110e07;
    border: 1px solid rgba(232,213,168,0.1);

    padding: 40px;
    text-align: center;
  }

  h1 {
    font-size: 42px;
    color: #5a8fa8;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  p {
    margin-bottom: 30px;
    color: rgba(245,237,216,0.7);
  }

  .btn-container {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 30px;
  }

  .game-btn,
  .logout-btn {
    padding: 14px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: white;
    cursor: pointer;

    font-size: 15px;
    transition: 0.2s;
  }

  .game-btn:hover {
    background: #2b2b2b;
    border-color: #777;
  }

  .logout-btn:hover {
    border-color: #c05050;
    color: #c05050;
  }
</style>
</head>

<body>

<div class="game-container">

  <h1>Admin Game Terminal</h1>
  <p>Welcome back, Admin. System initialized.</p>

  <div class="btn-container" id="buttonContainer"></div>

  <button class="logout-btn" id="logoutBtn">
    Disconnect Session
  </button>

</div>

<script>
const gameLaunchers = [
  {
      label: "#3 GN Math Alt",
      url: "https://gist.githubusercontent.com/coolgame67/59d6a8b124e82fba41bed018d8aade56/raw/492db0757bd03c3b3dd04ec65fdc0f0a7297258b/gistfile1.html"
  }
];

// --- FIX 1: Generate buttons dynamically on load ---
document.addEventListener("DOMContentLoaded", () => {
    const container = document.getElementById("buttonContainer");
    const logoutBtn = document.getElementById("logoutBtn");

    // Generate a button for every game in the array
    gameLaunchers.forEach(game => {
        const btn = document.createElement("button");
        btn.className = "game-btn";
        btn.textContent = `Launch ${game.label}`;
        btn.addEventListener("click", () => launchGame(game));
        container.appendChild(btn);
    });

    // Make logout functional
    logoutBtn.addEventListener("click", () => {
        localStorage.removeItem("hb_auth");
        window.location.href = "login.html";
    });
});

async function launchGame(game) {
    const popup = window.open("about:blank", "_blank");

    if (!popup) {
        alert("Allow popups first.");
        return;
    }

    popup.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>${game.label}</title>
            <style>
                html, body {
                    margin:0;
                    width:100%;
                    height:100%;
                    overflow:hidden;
                    background:black;
                }
            </style>
        </head>
        <body>
            Loading Game Components...
        </body>
        </html>
    `);
    popup.document.close();

    try {
        // FETCH RAW HTML WITH CORS PROXY
        const response = await fetch(
            "https://corsproxy.io/?" + encodeURIComponent(game.url)
        );

        if (!response.ok) {
            throw new Error("Failed to fetch file.");
        }

        let html = await response.text();

        // Remove frame blockers
        html = html.replace(
            /<meta[^>]*http-equiv=["']Content-Security-Policy["'][^>]*>/gi,
            ""
        );

        // OPEN DOCUMENT
        popup.document.open();
        popup.document.write(html);
        popup.document.close();

        // --- FIX 2: Correct order for DOM script execution injection ---
        const scripts = [...popup.document.querySelectorAll("script")];

        for (const oldScript of scripts) {
            const newScript = popup.document.createElement("script");

            // Copy attributes
            for (const attr of oldScript.attributes) {
                newScript.setAttribute(attr.name, attr.value);
            }

            // Copy inline JS
            newScript.textContent = oldScript.textContent;

            // Execute the script by forcing it onto the window DOM head/body
            oldScript.parentNode.replaceChild(newScript, oldScript);
        }

    } catch (err) {
        console.error(err);
        popup.document.body.innerHTML = `
            <h1 style="color:white;font-family:sans-serif;padding:20px;">
                Failed to load game
            </h1>
            <p style="color:red;padding:0 20px;">${err.message}</p>
        `;
    }
}
</script>

</body>
</html>
