<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harbor Boys — Admin Game</title>
  
  <script>
    // Kick out users who aren't logged in
    if (localStorage.getItem("hb_auth") !== "true") {
        window.location.href = "login.html";
    }
  </script>

  <link href="https://googleapis.com" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0804;
      color: #f5edd8;
      font-family: "EB Garamond", serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .game-container {
      width: 100%;
      max-width: 600px;
      background: #110e07;
      border: 1px solid rgba(232,213,168,0.1);
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.1em;
      color: #5a8fa8;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 30px;
      color: rgba(245,237,216,0.7);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid rgba(232,213,168,0.3);
      color: rgba(245,237,216,0.5);
      padding: 10px 20px;
      cursor: pointer;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.15em;
      transition: 0.2s;
    }

    .logout-btn:hover {
      color: #c05050;
      border-color: #c05050;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>Admin Game Terminal</h1>
    <p>Welcome back, Admin. System initialized.</p>
    
    <!-- Game interface goes here -->

    <button class="logout-btn" id="logoutBtn">Disconnect Session</button>
  </div>

  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      // Remove authentication token and return to login
      localStorage.removeItem("hb_auth");
      window.location.href = "login.html";
    });
  </script>

</body>
</html>
