<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harbor Boys Admin</title>

  <script>
    // If already logged in, skip the login screen and go straight to the game
    if (localStorage.getItem("hb_auth") === "true") {
        window.location.href = "game.html";
    }
  </script>

  <link href="https://googleapis.com" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0804;
      color: #f5edd8;
      font-family: "EB Garamond", serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* container */
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 0 24px;
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      font-size: 52px;
      letter-spacing: 0.08em;
    }

    .sub {
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #5a8fa8;
      margin-bottom: 48px;
      opacity: 0.8;
    }

    /* card */
    .card {
      background: #110e07;
      border: 1px solid rgba(232,213,168,0.1);
      padding: 40px 36px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #5a8fa8;
      margin-bottom: 28px;
    }

    /* fields */
    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,237,216,0.45);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #0a0804;
      border: 1px solid rgba(232,213,168,0.15);
      color: #f5edd8;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(90,143,168,0.6);
    }

    /* password toggle */
    .pw-wrap {
      position: relative;
    }

    .pw-wrap input {
      padding-right: 42px;
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      background: none;
      border: none;
      color: rgba(245,237,216,0.5);
    }

    .toggle:hover {
      color: rgba(245,237,216,0.8);
    }

    /* button */
    button {
      width: 100%;
      padding: 13px;
      margin-top: 4px;
      background: #c8622a;
      border: none;
      color: #f5edd8;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #d97040;
    }

    /* error */
    .error {
      color: #c05050;
      font-size: 13px;
      margin-bottom: 12px;
      opacity: 0;
      transition: 0.2s;
    }

    .error.show {
      opacity: 1;
    }

    /* shake */
    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: rgba(245,237,216,0.25);
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="login-wrap" id="card">

  <div class="logo">Harbor Boys</div>
  <div class="sub">Admin Portal • 2001</div>

  <div class="card">

    <div class="card-title">Restricted Access</div>

    <div class="error" id="error">Incorrect username or password.</div>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" autocomplete="off" />
    </div>

    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="password" type="password" autocomplete="off" />
        <button class="toggle" id="toggle">👁</button>
      </div>
    </div>

    <button id="loginBtn">Enter</button>

  </div>

  <a class="back" href="index.html">← Back</a>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const username = document.getElementById("username");
  const password = document.getElementById("password");
  const toggle = document.getElementById("toggle");
  const btn = document.getElementById("loginBtn");
  const error = document.getElementById("error");
  const card = document.getElementById("card");

  const VALID_USER = "admin";
  const VALID_PASS = "deadlydecisions";

  toggle.addEventListener("click", () => {
    const isHidden = password.type === "password";
    password.type = isHidden ? "text" : "password";
    toggle.textContent = isHidden ? "🙈" : "👁";
  });

  function login() {
    const u = username.value.trim();
    const p = password.value;

    if (u === VALID_USER && p === VALID_PASS) {
      // Authenticate user
      localStorage.setItem("hb_auth", "true");
      
      btn.textContent = "Access Granted...";
      btn.style.background = "#2a6040";

      setTimeout(() => {
        window.location.href = "game.html";
      }, 600);

    } else {
      error.classList.add("show");
      card.classList.remove("shake");
      void card.offsetWidth; // Trigger layout reflow to restart animation
      card.classList.add("shake");

      password.value = "";
      password.focus();
    }
  }

  btn.addEventListener("click", login);

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") login();
  });

  [username, password].forEach(el => {
    el.addEventListener("input", () => {
      error.classList.remove("show");
    });
  });

});
</script>

</body>
</html>
