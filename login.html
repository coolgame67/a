<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harbor Boys — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0804;
    color: #f5edd8;
    font-family: 'EB Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, #1a2535 0%, #0a0804 70%);
    z-index: 0;
  }

  .login-wrap {
    position: relative; z-index: 10;
    width: 100%; max-width: 400px;
    padding: 0 24px;
    animation: fadeUp 1s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 0.08em;
    color: #f5edd8;
    text-align: center;
    line-height: 1;
    margin-bottom: 4px;
  }

  .logo-sub {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #5a8fa8;
    margin-bottom: 48px;
    opacity: 0.8;
  }

  .card {
    background: #110e07;
    border: 1px solid rgba(232,213,168,0.1);
    padding: 40px 36px;
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #5a8fa8;
    margin-bottom: 28px;
    opacity: 0.8;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,237,216,0.45);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: #0a0804;
    border: 1px solid rgba(232,213,168,0.15);
    color: #f5edd8;
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.25s;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .field input:focus { border-color: rgba(90,143,168,0.6); }
  .field input::placeholder { color: rgba(245,237,216,0.2); }

  /* Password wrapper with toggle */
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 46px; }

  .pw-toggle {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    cursor: pointer; padding: 4px;
    color: rgba(245,237,216,0.3);
    transition: color 0.2s;
    line-height: 1;
  }
  .pw-toggle:hover { color: rgba(245,237,216,0.7); }
  .pw-toggle svg { width: 18px; height: 18px; display: block; fill: none; stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

  .error-msg {
    font-size: 13px;
    color: #c05050;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    min-height: 18px;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error-msg.show { opacity: 1; }

  .submit-btn {
    width: 100%;
    background: #c8622a;
    color: #f5edd8;
    border: none;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 13px;
    cursor: pointer;
    transition: background 0.25s, transform 0.15s;
    margin-top: 4px;
  }
  .submit-btn:hover { background: #d97040; }
  .submit-btn:active { transform: scale(0.98); }

  .back-link {
    display: block; text-align: center;
    margin-top: 24px;
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(245,237,216,0.25); text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: rgba(245,237,216,0.6); }

  /* shake animation on wrong pw */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">Harbor Boys</div>
  <div class="logo-sub">Admin Portal &nbsp;·&nbsp; 2001</div>

  <div class="card" id="loginCard">
    <div class="card-title">Restricted Access</div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off" spellcheck="false">
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="off">
        <button class="pw-toggle" id="pwToggle" type="button" aria-label="Toggle password visibility">
          <!-- Eye icon (shown when password is hidden) -->
          <svg id="iconEye" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Eye-off icon (shown when password is visible) -->
          <svg id="iconEyeOff" viewBox="0 0 24 24" style="display:none;">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg">Incorrect username or password.</div>

    <button class="submit-btn" id="loginBtn">Enter</button>
  </div>

  <a href="index.html" class="back-link">← Back to Harbor Boys</a>
</div>

<script>
  const VALID_USER = 'admin';
  const VALID_PASS = 'deadlydecisions';

  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const loginBtn   = document.getElementById('loginBtn');
  const errorMsg   = document.getElementById('errorMsg');
  const pwToggle   = document.getElementById('pwToggle');
  const iconEye    = document.getElementById('iconEye');
  const iconEyeOff = document.getElementById('iconEyeOff');
  const loginCard  = document.getElementById('loginCard');

  // Toggle password visibility
  pwToggle.addEventListener('click', () => {
    const isHidden = passwordEl.type === 'password';
    passwordEl.type = isHidden ? 'text' : 'password';
    iconEye.style.display    = isHidden ? 'none'  : 'block';
    iconEyeOff.style.display = isHidden ? 'block' : 'none';
    passwordEl.focus();
  });

  function attemptLogin() {
    const user = usernameEl.value.trim();
    const pass = passwordEl.value;

    if (user === VALID_USER && pass === VALID_PASS) {
      loginBtn.textContent = 'Access Granted...';
      loginBtn.style.background = '#2a6040';
      errorMsg.classList.remove('show');
      setTimeout(() => { window.location.href = 'game.html'; }, 700);
    } else {
      errorMsg.classList.add('show');
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth; // reflow to restart animation
      loginCard.classList.add('shake');
      passwordEl.value = '';
      passwordEl.focus();
    }
  }

  loginBtn.addEventListener('click', attemptLogin);

  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
  });

  // Clear error on typing
  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('input', () => errorMsg.classList.remove('show'));
  });
</script>
</body>
</html>
